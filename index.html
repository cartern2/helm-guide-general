<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Helm Guide">
<meta name="theme-color" content="#050e18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=yes">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<title>Helm Guide</title>
<style>
:root{
  --bg:#050e18;--surface:#0a1a28;--card:#0e2235;--border:rgba(38,96,140,.35);
  --gold:#e8b840;--gdim:#a07820;--sky:#5ab8e8;--green:#28c870;--red:#e84030;
  --amber:#e88020;--cream:#f0e8d0;--muted:#4a6880;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;overflow:hidden;-webkit-text-size-adjust:100%;}
#shell{display:flex;flex-direction:column;width:100%;height:100vh;height:100dvh;overflow:hidden;}
#topbar{background:var(--surface);border-bottom:2px solid var(--gdim);padding:max(env(safe-area-inset-top,0px),10px) 16px 10px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
#tb-title{font-size:1rem;font-weight:700;color:var(--gold);}
#tb-right{text-align:right;}
#tb-day{font-size:.68rem;font-weight:700;color:var(--gold);}
#tb-date{font-size:.58rem;letter-spacing:.1em;color:var(--sky);text-transform:uppercase;margin-top:1px;}
#app-status{display:flex;gap:6px;align-items:center;justify-content:flex-end;margin-top:4px;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
#app-status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(40,200,112,.45)}
#app-status.offline #app-status-dot{background:var(--amber)}
#bottomnav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px);}
.nt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 2px 8px;cursor:pointer;border:none;background:none;color:var(--muted);min-height:52px;gap:3px;border-top:2px solid transparent;user-select:none;transition:color .15s;}
.nt.active{color:var(--gold);border-top-color:var(--gold);background:rgba(232,184,64,.06);}
.nt:active{background:rgba(232,184,64,.12);}
.ni{font-size:1.2rem;line-height:1;}
.nl{font-size:.48rem;letter-spacing:.08em;text-transform:uppercase;}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
#content::-webkit-scrollbar{display:none;}

/* ── SHARED FORM ELEMENTS ── */
.field{margin-bottom:12px;}
.field label,.lbl{display:block;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.field input,.field select,.field textarea,
input.inp,select.inp,textarea.inp{width:100%;background:rgba(0,0,0,.42);border:1px solid var(--border);border-radius:8px;color:var(--cream);font-size:.88rem;padding:11px 12px;outline:none;-webkit-appearance:none;font-family:inherit;}
.field input:focus,.field select:focus,.field textarea:focus,
input.inp:focus,select.inp:focus,textarea.inp:focus{border-color:var(--sky);}
.field textarea,textarea.inp{resize:vertical;min-height:72px;line-height:1.5;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.hint{font-size:.62rem;color:var(--muted);margin-top:4px;line-height:1.5;}
.sec-sep{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--sky);margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid rgba(90,184,232,.15);}

/* ── WIZARD ── */
.wiz{padding:16px;max-width:520px;margin:0 auto;}
.wiz-hero{text-align:center;padding:24px 0 18px;}

/* ── WELCOME SCREEN ── */
.welcome-screen{padding:20px 16px 40px;max-width:560px;margin:0 auto;}
.welcome-hero{text-align:center;padding:20px 0 28px;}
.welcome-anchor{font-size:3.2rem;margin-bottom:10px;line-height:1;animation:anchorFloat 3s ease-in-out infinite;}
@keyframes anchorFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.welcome-title{font-size:1.8rem;font-weight:900;color:var(--gold);letter-spacing:.01em;line-height:1.15;margin-bottom:8px;}
.welcome-sub{font-size:.86rem;color:var(--cream);opacity:.78;line-height:1.6;max-width:420px;margin:0 auto;}
.feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px;}
.feature-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 12px;text-align:center;transition:all .2s;}
.feature-card:hover{border-color:rgba(232,184,64,.3);background:rgba(232,184,64,.03);}
.fc-icon{font-size:1.6rem;margin-bottom:8px;line-height:1;}
.fc-title{font-size:.8rem;font-weight:700;color:var(--cream);margin-bottom:4px;}
.fc-desc{font-size:.65rem;color:var(--muted);line-height:1.5;}
.welcome-cta-wrap{text-align:center;margin-bottom:28px;}
.welcome-cta{width:100%;padding:18px 20px;background:linear-gradient(135deg,rgba(40,200,112,.25),rgba(18,72,44,.9));border:1px solid rgba(40,200,112,.45);border-radius:14px;color:#eafff3;font-size:1.05rem;font-weight:800;letter-spacing:.02em;cursor:pointer;font-family:inherit;box-shadow:0 10px 30px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.08);transition:all .15s;}
.welcome-cta:active{transform:scale(.98);}
.welcome-cta:hover{filter:brightness(1.08);}
.welcome-cta-hint{font-size:.65rem;color:var(--muted);margin-top:10px;letter-spacing:.04em;}
.welcome-steps{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 16px;}
.ws-title{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--sky);margin-bottom:14px;text-align:center;}
.ws-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border2);}
.ws-row:last-child{border:none;padding-bottom:0;margin-bottom:0;}
.ws-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(232,184,64,.15);border:1px solid rgba(232,184,64,.3);color:var(--gold);font-size:.75rem;font-weight:800;flex-shrink:0;}
.ws-label{font-size:.82rem;font-weight:600;color:var(--cream);margin-bottom:3px;}
.ws-txt{font-size:.7rem;color:var(--muted);line-height:1.55;}
@media(max-width:400px){.feature-grid{grid-template-columns:1fr;}.welcome-title{font-size:1.5rem;}}
.wiz-anchor{font-size:2.2rem;margin-bottom:8px;}
.wiz-title{font-size:1.4rem;font-weight:800;color:var(--gold);}
.wiz-sub{font-size:.76rem;color:var(--muted);margin-top:6px;line-height:1.6;}
.wiz-steps{display:flex;align-items:center;justify-content:center;gap:0;margin:16px 0 22px;}
.ws{display:flex;flex-direction:column;align-items:center;gap:4px;}
.wsn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;border:2px solid var(--border);color:var(--muted);background:var(--card);transition:all .2s;}
.ws.done .wsn{background:rgba(40,200,112,.15);border-color:var(--green);color:var(--green);}
.ws.active .wsn{background:rgba(232,184,64,.15);border-color:var(--gold);color:var(--gold);}
.wsl{font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.ws.active .wsl{color:var(--gold);}
.wsc{flex:1;height:2px;background:var(--border);margin:0 3px;margin-bottom:14px;max-width:32px;}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:18px;overflow:hidden;}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s ease;}
.wiz-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.wiz-section-title{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--sky);margin-bottom:14px;}
.wiz-btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:.88rem;font-weight:800;letter-spacing:.04em;cursor:pointer;margin-bottom:8px;transition:all .15s;font-family:inherit;}
.wiz-btn.primary{background:linear-gradient(135deg,rgba(232,184,64,.25),rgba(232,184,64,.1));border:1px solid rgba(232,184,64,.4);color:var(--gold);}
.wiz-btn.green{background:linear-gradient(135deg,rgba(40,200,112,.22),rgba(18,72,44,.96));border:1px solid rgba(40,200,112,.4);color:#eafff3;}
.wiz-btn.secondary{background:rgba(90,184,232,.08);border:1px solid rgba(90,184,232,.2);color:var(--sky);}
.wiz-btn.danger{background:rgba(232,64,48,.08);border:1px solid rgba(232,64,48,.25);color:#f06050;}
.wiz-btn.ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.wiz-btn:active{transform:scale(.98);}
.wiz-nav{display:flex;gap:8px;margin-top:4px;}
.wiz-nav .wiz-btn{margin-bottom:0;}
.stop-card{background:rgba(0,20,40,.6);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.stop-card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.stop-num{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;}
.stop-del{background:rgba(232,64,48,.1);border:1px solid rgba(232,64,48,.2);color:#f06050;border-radius:6px;padding:5px 9px;font-size:.62rem;cursor:pointer;font-family:inherit;}
.stop-edit{background:rgba(90,184,232,.1);border:1px solid rgba(90,184,232,.2);color:var(--sky);border-radius:6px;padding:5px 9px;font-size:.62rem;cursor:pointer;font-family:inherit;}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.tag-chip{padding:5px 10px;border-radius:6px;font-size:.6rem;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:inherit;}
.tag-chip.fuel{background:rgba(40,200,112,.08);border-color:rgba(40,200,112,.2);color:var(--green);}
.tag-chip.fuel.on{background:rgba(40,200,112,.22);border-color:var(--green);}
.tag-chip.warn{background:rgba(232,64,48,.08);border-color:rgba(232,64,48,.2);color:#f06050;}
.tag-chip.warn.on{background:rgba(232,64,48,.22);border-color:#f06050;}
.tag-chip.info{background:rgba(90,184,232,.08);border-color:rgba(90,184,232,.2);color:var(--sky);}
.tag-chip.info.on{background:rgba(90,184,232,.2);border-color:var(--sky);}
.tag-chip.amber{background:rgba(232,128,32,.08);border-color:rgba(232,128,32,.2);color:var(--amber);}
.tag-chip.amber.on{background:rgba(232,128,32,.2);border-color:var(--amber);}

/* emergency harbor subform */
.emerg-subform{background:rgba(232,128,32,.06);border:1px solid rgba(232,128,32,.2);border-radius:10px;padding:12px;margin-top:10px;}
.emerg-subform-title{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--amber);margin-bottom:10px;}
.emerg-card{background:rgba(0,0,0,.3);border:1px solid rgba(232,128,32,.18);border-radius:8px;padding:10px;margin-bottom:7px;}
.emerg-card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.emerg-card-name{font-size:.8rem;font-weight:700;color:var(--amber);}
.emerg-card-del{background:none;border:none;color:#f06050;font-size:.75rem;cursor:pointer;padding:2px 6px;}
.emerg-card-detail{font-size:.65rem;color:var(--muted);line-height:1.5;}

/* ── APP TABS ── */
.sec-hd{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px 10px;position:sticky;top:0;z-index:10;}
.sec-title{font-size:1rem;font-weight:700;color:var(--gold);}
.sec-sub{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
#day-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
#day-tabs::-webkit-scrollbar{display:none;}
.dt{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);min-height:52px;gap:2px;transition:all .15s;}
.dt.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(232,184,64,.06);}
.dt:active{background:rgba(232,184,64,.1);}
.dtn{font-size:.7rem;font-weight:700;letter-spacing:.05em;}
.dtd{font-size:.5rem;color:inherit;opacity:.7;}
#prog-strip{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;}
.prog-lbl{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.prog-row{display:flex;gap:4px;}
.ps{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 0;}
.pb{width:100%;height:5px;border-radius:3px;background:rgba(38,96,140,.28);transition:background .2s;}
.ps.done .pb{background:var(--gdim);}
.ps.cur .pb{background:var(--gold);box-shadow:0 0 8px rgba(232,184,64,.6);}
.psl{font-size:.5rem;color:var(--muted);}
.ps.cur .psl{color:var(--gold);}
#prog-txt{font-size:.65rem;color:var(--sky);margin-top:6px;line-height:1.4;}
.hero{margin:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.hero-hd{background:linear-gradient(135deg,#0e2840,#1a3850);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;}
.hdaynum{font-size:2.6rem;font-weight:900;color:rgba(232,184,64,.18);line-height:1;}
.hright{text-align:right;}
.hdatestr{font-size:.6rem;letter-spacing:.15em;color:var(--sky);text-transform:uppercase;margin-bottom:3px;}
.hnm{font-size:1.4rem;font-weight:700;color:var(--gold);}
.hhrs{font-size:.62rem;color:var(--muted);letter-spacing:.08em;margin-top:1px;}
.hero-body{padding:16px;}
.hroute-lbl{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.hmarina{font-size:1.15rem;font-weight:700;color:var(--cream);margin-bottom:14px;line-height:1.2;}
.cblk{background:rgba(0,20,40,.85);border:2px solid var(--sky);border-radius:8px;padding:12px 14px;margin-bottom:12px;}
.clbl{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--sky);margin-bottom:6px;}
.cnum{font-size:1.05rem;font-weight:700;letter-spacing:.05em;color:#fff;line-height:1.85;}
.copy-btn{display:block;width:100%;margin-top:9px;padding:11px;background:rgba(90,184,232,.1);border:1px solid rgba(90,184,232,.28);border-radius:6px;color:var(--sky);font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;text-align:center;transition:background .15s;font-family:inherit;}
.copy-btn:active{background:rgba(90,184,232,.25);}
.metrics{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.mpill{background:rgba(38,96,140,.2);border:1px solid rgba(38,96,140,.32);border-radius:20px;padding:6px 11px;font-size:.65rem;color:var(--sky);}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.tag{padding:4px 9px;border-radius:4px;font-size:.58rem;letter-spacing:.07em;text-transform:uppercase;}
.tf{background:rgba(40,200,112,.12);color:#28c870;border:1px solid rgba(40,200,112,.25);}
.tw{background:rgba(232,64,48,.12);color:#f06050;border:1px solid rgba(232,64,48,.25);}
.td{background:rgba(40,120,80,.15);color:#60d090;border:1px solid rgba(40,120,80,.3);}
.ti{background:rgba(90,184,232,.1);color:var(--sky);border:1px solid rgba(90,184,232,.2);}
.ta{background:rgba(232,128,32,.12);color:var(--amber);border:1px solid rgba(232,128,32,.25);}
.cblk2{background:rgba(0,0,0,.3);border-radius:6px;padding:10px 12px;margin-bottom:10px;}
.clbl2{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.ctxt{font-size:.78rem;color:var(--cream);line-height:1.85;}
.ctxt a{color:var(--gold);text-decoration:none;}
.nav-blk{background:rgba(0,30,60,.5);border-left:3px solid var(--sky);border-radius:0 6px 6px 0;padding:10px 12px;margin-bottom:10px;font-size:.75rem;line-height:1.65;color:rgba(240,232,208,.82);}
.nav-blk-t{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--sky);margin-bottom:5px;}
.warn-blk{background:rgba(232,64,48,.1);border:1px solid rgba(232,64,48,.32);border-radius:6px;padding:10px 12px;margin-bottom:10px;font-size:.75rem;line-height:1.6;color:rgba(255,180,160,.9);}
.warn-blk-t{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:#f06050;margin-bottom:4px;font-weight:700;}
.fuel-blk{background:rgba(232,128,32,.1);border:1px solid rgba(232,128,32,.28);border-radius:6px;padding:10px 12px;margin-bottom:10px;font-size:.75rem;line-height:1.6;color:rgba(255,215,150,.9);}
.fuel-blk-t{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);margin-bottom:4px;font-weight:700;}
.emerg-lbl{padding:12px 16px 6px;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);}
.ec{margin:0 12px 10px;background:rgba(40,20,0,.65);border:1px solid rgba(180,100,20,.38);border-radius:10px;overflow:hidden;}
.ec-hd{background:rgba(60,30,0,.85);padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;}
.ec-name{font-size:.95rem;font-weight:700;color:var(--amber);line-height:1.2;}
.ec-dist{font-size:.58rem;color:rgba(180,140,80,.7);margin-top:2px;}
.vbdg{display:inline-block;padding:4px 9px;background:rgba(232,184,64,.12);border:1px solid rgba(232,184,64,.25);border-radius:4px;font-size:.62rem;letter-spacing:.1em;color:var(--gold);}
.ec-body{padding:12px 14px;}
.ec-coords{font-size:.82rem;font-weight:700;color:rgba(200,170,100,.9);margin-bottom:6px;line-height:1.8;}
.ec-phone{font-size:.72rem;color:var(--amber);margin-bottom:6px;}
.ec-phone a{color:var(--amber);text-decoration:none;}
.ec-why{font-size:.72rem;color:rgba(220,180,120,.8);line-height:1.55;}
.quick-grid{display:grid;grid-template-columns:1fr;gap:10px;margin:12px;}
.qa-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 10px;border-radius:12px;text-decoration:none;border:1px solid var(--border);background:linear-gradient(180deg,rgba(90,184,232,.12),rgba(14,34,53,.9));color:var(--cream);font-size:.72rem;font-weight:700;letter-spacing:.05em;min-height:58px;cursor:pointer;font-family:inherit;}
.qa-btn:active{transform:scale(.99);}
.nav-cta{min-height:64px;font-size:.9rem;background:linear-gradient(180deg,rgba(40,200,112,.22),rgba(18,72,44,.96));border-color:rgba(40,200,112,.42);color:#eafff3;}
.secondary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mini-card{margin:0 12px 10px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.mini-hd{padding:11px 14px;background:rgba(0,20,40,.7);border-bottom:1px solid var(--border);}
.mini-title{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--sky);}
.mini-body{padding:12px 14px;}
.sel{width:100%;background:rgba(0,0,0,.42);border:1px solid var(--border);color:var(--cream);border-radius:8px;padding:11px 10px;font-size:.85rem;outline:none;-webkit-appearance:none;font-family:inherit;}
.sel:focus{border-color:var(--sky);}
.decision-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.decision-out{border-radius:10px;padding:12px 14px;border:1px solid var(--border);background:rgba(0,20,40,.58);margin-top:10px;}
.decision-out.go{border-color:rgba(40,200,112,.35);background:rgba(40,200,112,.08);}
.decision-out.caution{border-color:rgba(232,128,32,.35);background:rgba(232,128,32,.09);}
.decision-out.nogo{border-color:rgba(232,64,48,.38);background:rgba(232,64,48,.08);}
.decision-title{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.decision-value{font-size:1rem;font-weight:800;}
.decision-copy{font-size:.72rem;line-height:1.6;color:rgba(240,232,208,.86);margin-top:6px;}
.link-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}

.vhf-tbl{margin:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.vhf-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(38,96,140,.15);gap:14px;}
.vhf-row:last-child{border:none;}
.vch{font-size:.95rem;font-weight:700;color:var(--gold);width:50px;flex-shrink:0;}

.switch{position:relative;width:52px;height:30px;background:rgba(90,184,232,.12);border:1px solid rgba(90,184,232,.2);border-radius:999px;cursor:pointer;flex-shrink:0;}

<body>
<div id="shell">
  <div id="topbar">
    <div id="tb-title">⚓ Helm Guide</div>
    <div id="tb-right">
      <div id="tb-day">Route Planner</div>
      <div id="tb-date"></div>
      <div id="app-status"><span id="app-status-dot"></span><span id="app-status-text">Ready</span></div>
    </div>
  </div>
  <div id="content"></div>
  <div id="bottomnav" style="display:none">
    <button class="nt active" onclick="showTab('today')" id="tab-today"><span class="ni">🧭</span><span class="nl">Today</span></button>
    <button class="nt" onclick="showTab('gps')" id="tab-gps"><span class="ni">📍</span><span class="nl">GPS</span></button>
    <button class="nt" onclick="showTab('alerts')" id="tab-alerts"><span class="ni">⚠</span><span class="nl">Alerts</span></button>
    <button class="nt" onclick="showTab('contacts')" id="tab-contacts"><span class="ni">☎</span><span class="nl">Phones</span></button>
    <button class="nt" onclick="showTab('fuel')" id="tab-fuel"><span class="ni">⛽</span><span class="nl">Fuel</span></button>
    <button class="nt" onclick="showTab('vessel')" id="tab-vessel"><span class="ni">🚢</span><span class="nl">Vessel</span></button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
var ST = {
  setup:false, wizStep:0, editingStop:-1,
  voyage:{name:'',startDate:'',endDate:''},
  vessel:{
    name:'',make:'',model:'',year:'',length:'',beam:'',draft:'',
    hullType:'',engineMake:'',engineModel:'',engineCount:'1',horsepower:'',
    tankSize:'250',speed:'10',burn:'18',vhf:'CH 9',
    mmsi:'',documentation:'',homePort:'',insuranceProvider:'',
    insurancePolicyNum:'',towingMembership:'',emergencyContact:'',emergencyPhone:'',
    notes:''
  },
  stops:[],
  progress:-1,
  fuelGal:{},fuelPrice:{},
  decision:{},
  plan:{tankSize:'250',currentFuel:'200',reservePct:'20',speed:'10',burn:'18'},
  crewMode:false,lastPosition:null,weather:{},
  profileEditing:false
};
var curDay=0,curTab='today';

function loadST(){
  try{var s=localStorage.getItem('helmguide_v2');if(s){var p=JSON.parse(s);ST=deepMerge(ST,p);}}catch(e){}
  curDay=ST.progress>=0?Math.min((ST.stops.length||1)-1,ST.progress):0;
}
function saveST(){try{localStorage.setItem('helmguide_v2',JSON.stringify(ST));}catch(e){}}
function deepMerge(target,source){
  var out=Object.assign({},target);
  for(var k in source){
    if(source[k]&&typeof source[k]==='object'&&!Array.isArray(source[k])){
      out[k]=deepMerge(target[k]||{},source[k]);
    }else{out[k]=source[k];}
  }
  return out;
}

// ═══════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════
function boot(){
  loadST();
  updateNetworkStatus();
  registerSW();
  if(!ST.setup||!ST.stops||ST.stops.length===0){showWizard();}
  else{showApp();}
}
function showWizard(){
  document.getElementById('bottomnav').style.display='none';
  document.getElementById('tb-day').textContent='Route Setup';
  document.getElementById('tb-date').textContent='';
  renderWizard();
}
function showApp(){
  document.getElementById('bottomnav').style.display='flex';
  showTab('today');
}

// ═══════════════════════════════════════════════
//  WIZARD — STEP 1: VOYAGE
// ═══════════════════════════════════════════════
function renderWizard(){
  // Show welcome screen first (before wizard)
  if(!ST.wizStep || ST.wizStep===0){
    renderWelcome();
    return;
  }
  var step=ST.wizStep;
  var c=document.getElementById('content');
  var pct=Math.round(((step-1)/3)*100);
  var labels=['Your Trip','Your Boat','Your Stops'];
  var h='<div class="wiz">';
  h+='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
  h+='<div class="wiz-steps">';
  for(var i=0;i<labels.length;i++){
    var cls=i+1<step?'done':i+1===step?'active':'';
    h+='<div class="ws '+cls+'"><div class="wsn">'+(i+1<step?'✓':(i+1))+'</div><div class="wsl">'+labels[i]+'</div></div>';
    if(i<labels.length-1)h+='<div class="wsc"></div>';
  }
  h+='</div>';
  if(step===1)h+=wizStep1();
  else if(step===2)h+=wizStep2();
  else if(step===3)h+=wizStep3();
  h+='</div>';
  c.innerHTML=h;c.scrollTop=0;
}

function renderWelcome(){
  var c=document.getElementById('content');
  c.innerHTML =
    '<div class="welcome-screen">'
    +'<div class="welcome-hero">'
    +'<div class="welcome-anchor">⚓</div>'
    +'<div class="welcome-title">Plan Your Boat Trip</div>'
    +'<div class="welcome-sub">Helm Guide helps you map out every stop, get turn-by-turn routes between marinas, and stay safe on the water — even when you lose signal.</div>'
    +'</div>'

    +'<div class="feature-grid">'
    +'<div class="feature-card"><div class="fc-icon">🗺</div><div class="fc-title">Plan Your Route</div><div class="fc-desc">Search for marinas and we\'ll fill in the GPS coordinates automatically.</div></div>'
    +'<div class="feature-card"><div class="fc-icon">⚓</div><div class="fc-title">Emergency Harbors</div><div class="fc-desc">We suggest nearby safe harbors for every stop — just in case.</div></div>'
    +'<div class="feature-card"><div class="fc-icon">🌦️</div><div class="fc-title">Live Weather</div><div class="fc-desc">Real-time NOAA wind and forecasts for each destination.</div></div>'
    +'<div class="feature-card"><div class="fc-icon">⛽</div><div class="fc-title">Fuel Planner</div><div class="fc-desc">Track your fuel and get warnings before you run low.</div></div>'
    +'</div>'

    +'<div class="welcome-cta-wrap">'
    +'<button class="welcome-cta" onclick="startWizard()">🚢 Let\'s Plan My Trip →</button>'
    +'<div class="welcome-cta-hint">Takes about 3 minutes · Everything saves automatically</div>'
    +'</div>'

    +'<div class="welcome-steps">'
    +'<div class="ws-title">How it works</div>'
    +'<div class="ws-row"><div class="ws-num">1</div><div><div class="ws-label">Tell us about your trip</div><div class="ws-txt">Name your voyage and pick your dates.</div></div></div>'
    +'<div class="ws-row"><div class="ws-num">2</div><div><div class="ws-label">Tell us about your boat</div><div class="ws-txt">Basic info like length, fuel capacity, and cruising speed.</div></div></div>'
    +'<div class="ws-row"><div class="ws-num">3</div><div><div class="ws-label">Add your stops</div><div class="ws-txt">Search for each marina — we handle the rest.</div></div></div>'
    +'</div>'

    +'</div>';
  c.scrollTop = 0;
}

function startWizard(){
  ST.wizStep = 1;
  saveST();
  renderWizard();
}

function wizStep1(){
  var v=ST.voyage;
  return '<div style="text-align:center;padding:14px 0 20px">'
    +'<div style="font-size:1.8rem;margin-bottom:8px">🗺</div>'
    +'<div class="wiz-title" style="font-size:1.3rem">Tell us about your trip</div>'
    +'<div class="wiz-sub">Just a name and dates — you can change these later.</div>'
    +'</div>'
    +'<div class="wiz-section"><div class="wiz-section-title">Trip Details</div>'
    +'<div class="field"><label>What should we call this trip?</label><input id="w_vname" placeholder="e.g. Summer on Lake Michigan" value="'+esc(v.name||'')+'" autofocus></div>'
    +'<div class="field-row">'
    +'<div class="field"><label>Start Date</label><input id="w_vstart" type="date" value="'+(v.startDate||'')+'"></div>'
    +'<div class="field"><label>End Date</label><input id="w_vend" type="date" value="'+(v.endDate||'')+'"></div>'
    +'</div></div>'
    +'<button class="wiz-btn primary" onclick="wizNext1()">Next: Your Boat →</button>'
    +'<button class="wiz-btn ghost" onclick="backToWelcome()" style="margin-top:6px">← Back</button>';
}
function backToWelcome(){
  ST.wizStep=0; saveST(); renderWizard();
}
function wizNext1(){
  var name=document.getElementById('w_vname').value.trim();
  if(!name){alert('Please enter a voyage name.');return;}
  ST.voyage={name:name,startDate:document.getElementById('w_vstart').value,endDate:document.getElementById('w_vend').value};
  ST.wizStep=2;saveST();renderWizard();
}

// ═══════════════════════════════════════════════
//  WIZARD — STEP 2: VESSEL
// ═══════════════════════════════════════════════
function wizStep2(){
  var v=ST.vessel;
  return '<div style="text-align:center;padding:14px 0 20px">'
    +'<div style="font-size:1.8rem;margin-bottom:8px">🚢</div>'
    +'<div class="wiz-title" style="font-size:1.3rem">Tell us about your boat</div>'
    +'<div class="wiz-sub">Just the basics — this helps us calculate fuel, range, and timing for your trip.</div>'
    +'</div>'

    +'<div class="wiz-section"><div class="wiz-section-title">The Basics</div>'
    +'<div class="field"><label>Boat name</label><input id="w_bname" placeholder="e.g. Sea Breeze" value="'+esc(v.name||'')+'" autofocus></div>'
    +'<div class="field-row">'
    +'<div class="field"><label>Length (ft)</label><input id="w_length" type="number" inputmode="decimal" placeholder="36" value="'+(v.length||'')+'"></div>'

function wizNext2(){
  var name=document.getElementById('w_bname').value.trim();

  ST.vessel=Object.assign(ST.vessel,{
    name:name,make:v('w_make'),model:v('w_model'),year:v('w_year'),
    length:v('w_length'),beam:v('w_beam'),draft:v('w_draft'),hullType:v('w_hull'),

}

function wizStep3(){
  var stops=ST.stops||[];
  var editing=ST.editingStop>=0;
  var es=editing?stops[ST.editingStop]:{};
  var h='';

  // Intro
  if(stops.length===0){
    h+='<div style="text-align:center;padding:14px 0 18px">'
      +'<div style="font-size:1.8rem;margin-bottom:8px">📍</div>'
      +'<div class="wiz-title" style="font-size:1.3rem">Add your stops</div>'
      +'<div class="wiz-sub">Search for each marina or destination below.<br>We\'ll auto-fill GPS coordinates and suggest emergency harbors.</div>'
      +'</div>';
  }

  // Existing stops with route visualization
  if(stops.length>0){
    h+='<div class="wiz-section" style="padding:16px">';
    h+='<div class="wiz-section-title" style="margin-bottom:12px">📋 Your Route ('+stops.length+' stop'+(stops.length>1?'s':'')+')</div>';
    var totalNm=0;
    for(var i=0;i<stops.length;i++){
      var s=stops[i];
      var legNm = null;
      if(i>0 && s.lat && s.lon && stops[i-1].lat && stops[i-1].lon){
        var p1=decimalPair(stops[i-1].lat, stops[i-1].lon);
        var p2=decimalPair(s.lat, s.lon);
        if(p1 && p2){
          legNm = calcDistNm(p1.lat, p1.lon, p2.lat, p2.lon);
          totalNm += legNm;
        }
      }
      // Leg between stops
      if(i>0){
        h+='<div style="display:flex;align-items:center;gap:10px;padding:4px 0 4px 13px;color:var(--muted);font-size:.65rem;border-left:2px dashed var(--border);margin-left:13px">';
        h+='<span style="font-size:.8rem">↓</span>';
        if(legNm!==null){
          var legHrs = ST.vessel.speed ? (legNm/parseFloat(ST.vessel.speed)).toFixed(1) : '';
          h+='<span>~'+legNm.toFixed(1)+' NM'+(legHrs?' · '+legHrs+' hrs':'')+'</span>';
        } else {
          h+='<span style="color:var(--muted);opacity:.6">— NM —</span>';
        }
        h+='</div>';
      }
      // Stop row
      h+='<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(0,20,40,.5);border:1px solid var(--border);border-radius:10px;margin-bottom:0">';
      var badge = i===0 ? '🚢' : (i===stops.length-1 ? '🏁' : (i+1));
      h+='<div style="width:30px;height:30px;border-radius:50%;background:rgba(232,184,64,.15);border:1px solid rgba(232,184,64,.3);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0">'+badge+'</div>';
      h+='<div style="flex:1;min-width:0">';
      h+='<div style="font-size:.78rem;font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(s.name||'Stop '+(i+1))+'</div>';
      var subtext = '';
      if(i===0) subtext = 'Starting Point';
      else if(i===stops.length-1) subtext = 'Final Destination';
      else subtext = 'Stop '+(i+1);
      if(s.emerg && s.emerg.length) subtext += ' · ⚓ '+s.emerg.length+' harbors';
      h+='<div style="font-size:.6rem;color:var(--muted);margin-top:1px">'+subtext+'</div>';
      h+='</div>';
      h+='<button class="stop-edit" onclick="editStop('+i+')" style="padding:6px 10px">Edit</button>';
      h+='<button class="stop-del" onclick="delStop('+i+')" style="padding:6px 10px">✕</button>';
      h+='</div>';
    }
    if(totalNm>0){
      var totalHrs = ST.vessel.speed ? (totalNm/parseFloat(ST.vessel.speed)).toFixed(1) : '';
      h+='<div style="margin-top:12px;padding:10px 12px;background:rgba(232,184,64,.06);border:1px solid rgba(232,184,64,.2);border-radius:8px;text-align:center">';
      h+='<div style="font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:3px">Total Route</div>';
      h+='<div style="font-size:.95rem;font-weight:700;color:var(--gold)">'+totalNm.toFixed(0)+' Nautical Miles'+(totalHrs?' · ~'+totalHrs+' hrs cruising':'')+'</div>';
      h+='</div>';
    }
    h+='</div>';
  }

  // Stop add/edit form
  var formTitle;
  if(editing){
    formTitle = ST.editingStop===0 ? '✏️ Edit Starting Point' : (ST.editingStop===stops.length-1 ? '✏️ Edit Final Destination' : '✏️ Edit Stop '+(ST.editingStop+1));
  } else {
    formTitle = stops.length===0 ? '🚢 Add Your Starting Point' : '➕ Add Next Stop';
  }
  h+='<div class="wiz-section"><div class="wiz-section-title">'+formTitle+'</div>';

  // ── PLACE SEARCH ──
  h+='<div class="field" style="position:relative">';
  h+='<label>📍 Where to?</label>';
  h+='<div style="display:flex;gap:8px">';
  h+='<input id="ns_search" placeholder="'+(stops.length===0?'Search your starting marina…':'Search the next destination…')+'" value="'+esc(es.name||'')+'" oninput="placeSearchDebounce()" autocomplete="off" style="flex:1">';
  h+='<button onclick="placeSearch()" style="padding:10px 14px;background:rgba(90,184,232,.12);border:1px solid rgba(90,184,232,.28);border-radius:8px;color:var(--sky);font-size:.72rem;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit">🔍 Search</button>';

  h+='<div class="hint">Type a marina, harbor, or city name — tap a result to auto-fill coordinates.</div>';
  h+='</div>';

  // ── FILLED INDICATOR ──
  h+='<div id="place-selected" style="display:'+(es.lat&&es.lon?'flex':'none')+';align-items:center;gap:8px;background:rgba(40,200,112,.08);border:1px solid rgba(40,200,112,.22);border-radius:8px;padding:10px 12px;margin-bottom:10px">';
  h+='<span style="font-size:1rem">✅</span>';
  h+='<div style="flex:1"><div style="font-size:.76rem;font-weight:600;color:var(--green)" id="place-selected-name">'+esc(es.name||'')+'</div><div style="font-family:\'IBM Plex Mono\',monospace;font-size:.62rem;color:var(--muted)" id="place-selected-coords">'+(es.lat&&es.lon?esc(es.lat)+' / '+esc(es.lon):'')+'</div></div>';
  h+='<button onclick="clearPlaceSelection()" style="background:none;border:none;color:var(--muted);font-size:.72rem;cursor:pointer;padding:4px">✕ Clear</button>';
  h+='</div>';

  // Simple essential fields
  h+='<div class="field-row">';
  h+='<div class="field"><label>Date (optional)</label><input id="ns_date" type="date" value="'+(es.date||'')+'"></div>';
  h+='<div class="field"><label>Phone (optional)</label><input id="ns_phone" type="tel" placeholder="231-555-1234" value="'+esc(es.phone||'')+'"></div>';
  h+='</div>';

  // Hidden simpler fields (auto-filled but editable via advanced)
  h+='<input type="hidden" id="ns_name" value="'+esc(es.name||'')+'">';
  h+='<input type="hidden" id="ns_marina" value="'+esc(es.marina||'')+'">';
  h+='<input type="hidden" id="ns_lat" value="'+esc(es.lat||'')+'">';
  h+='<input type="hidden" id="ns_lon" value="'+esc(es.lon||'')+'">';
  h+='<input type="hidden" id="ns_vhf" value="'+esc(es.vhf||'CH 9')+'">';
  h+='<input type="hidden" id="ns_nm" value="'+esc(es.nm||'')+'">';

  // ── ADVANCED COLLAPSIBLE ──
  h+='<div style="margin-top:4px;border-top:1px solid var(--border);padding-top:10px">';
  h+='<div onclick="toggleAdvancedStop()" id="adv-stop-toggle" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:8px 2px">';
  h+='<div><div style="font-size:.74rem;font-weight:600;color:var(--cream)">More options</div><div style="font-size:.6rem;color:var(--muted);margin-top:2px">Manual coordinates, navigation notes, warnings, amenity tags, emergency harbors</div></div>';
  h+='<span id="adv-stop-arrow" style="color:var(--muted)">▾</span></div>';
  h+='<div id="adv-stop-body" style="display:none;padding-top:10px">';

  h+='<div class="field"><label>Stop Name</label><input id="ns_name_v" value="'+esc(es.name||'')+'" oninput="document.getElementById(\'ns_name\').value=this.value"></div>';
  h+='<div class="field"><label>Marina / Anchorage</label><input id="ns_marina_v" placeholder="e.g. Petoskey City Marina" value="'+esc(es.marina||'')+'" oninput="document.getElementById(\'ns_marina\').value=this.value"></div>';
  h+='<div class="field-row">';
  h+='<div class="field"><label>VHF</label><input id="ns_vhf_v" placeholder="CH 9" value="'+esc(es.vhf||'CH 9')+'" oninput="document.getElementById(\'ns_vhf\').value=this.value"></div>';
  h+='<div class="field"><label>Distance (NM, auto)</label><input id="ns_nm_v" type="number" placeholder="auto" value="'+esc(es.nm||'')+'" oninput="document.getElementById(\'ns_nm\').value=this.value"></div>';
  h+='</div>';
  h+='<div class="sec-sep">GPS Coordinates</div>';
  h+='<div class="field-row">';
  h+='<div class="field"><label>Latitude</label><input id="ns_lat_v" placeholder="45° 22.567\'N" value="'+esc(es.lat||'')+'" oninput="document.getElementById(\'ns_lat\').value=this.value"></div>';
  h+='<div class="field"><label>Longitude</label><input id="ns_lon_v" placeholder="084° 57.500\'W" value="'+esc(es.lon||'')+'" oninput="document.getElementById(\'ns_lon\').value=this.value"></div>';
  h+='</div>';
  h+='<div class="field"><label>Navigation Notes</label><textarea id="ns_nav" placeholder="Approach from west, hail on VHF…">'+esc(es.nav||'')+'</textarea></div>';
  h+='<div class="field"><label>Fuel Note</label><textarea id="ns_fuel" style="min-height:52px" placeholder="Top off here — last fuel before…">'+esc(es.fuel||'')+'</textarea></div>';
  h+='<div class="field"><label>Warning / Watch</label><textarea id="ns_warn" style="min-height:52px" placeholder="Ferry wakes overnight, shallow bar on approach…">'+esc(es.warn||'')+'</textarea></div>';

  // Tags
  var tags=es.tags||[];
  h+='<div class="sec-sep">Amenity Tags</div>';
  h+='<div class="tag-row">';
  var tagDefs=[
    {id:'fuel_here',label:'⛽ Fuel Here',cls:'fuel'},{id:'no_fuel',label:'⛽ No Fuel',cls:'warn'},

    {id:'pumpout',label:'🔄 Pump-Out',cls:'info'},{id:'wifi',label:'📶 Wi-Fi',cls:'info'},
    {id:'dnr',label:'🏛 DNR Harbor',cls:'info'},{id:'fill_tanks',label:'⚠ Fill Tanks!',cls:'amber'},
    {id:'extra_fenders',label:'🛡 Extra Fenders',cls:'amber'},{id:'call_ahead',label:'📞 Call Ahead',cls:'amber'}
  ];

function wizEmergencyEditor(emergList){
  var h='<div class="emerg-subform">';
  h+='<div class="emerg-subform-title">🚨 Emergency / Weather Harbors for This Stop</div>';

  // ── Auto-suggest area (populated when a place is selected) ──
  h+='<div id="emerg-suggest-area" style="margin-bottom:10px">';
  // Only show hint if no coords selected yet
  var hasCoords = !!(document.getElementById && document.getElementById('ns_lat') && document.getElementById('ns_lat').value);
  h+='<div style="font-size:.64rem;color:var(--muted);line-height:1.5">'
    +(emergList.length===0 ? 'Search for a destination above to auto-suggest nearby emergency harbors.' : '')
    +'</div>';
  h+='</div>';

  // Existing emergency harbors for this stop
  for(var i=0;i<emergList.length;i++){
    var e=emergList[i];
    h+='<div class="emerg-card">';
    h+='<div class="emerg-card-hd"><div class="emerg-card-name">'+esc(e.name||'Harbor')+'</div>';
    h+='<button class="emerg-card-del" onclick="delEmergHarbor('+i+')">✕ Remove</button></div>';
    h+='<div class="emerg-card-detail">';
    if(e.dist)h+=e.dist+' · ';
    if(e.lat&&e.lon)h+=esc(e.lat)+' / '+esc(e.lon)+'<br>';
    if(e.phone)h+='📞 '+esc(e.phone)+(e.vhf?' · '+esc(e.vhf):'')+'<br>';
    if(e.why)h+='<span style="color:rgba(220,180,120,.8)">'+esc(e.why)+'</span>';
    h+='</div></div>';
  }

  // Add form
  h+='<div style="font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin:10px 0 8px">'+(emergList.length>0?'Add Another Harbor':'Add Harbor')+'</div>';
  h+='<div class="field"><label>Harbor Name</label><input id="eh_name" placeholder="e.g. Charlevoix City Marina"></div>';
  h+='<div class="field-row">';
  h+='<div class="field"><label>Distance / Direction</label><input id="eh_dist" placeholder="~5 NM SW"></div>';
  h+='<div class="field"><label>VHF</label><input id="eh_vhf" placeholder="CH 9"></div>';
  h+='</div>';
  h+='<div class="field-row">';
  h+='<div class="field"><label>Latitude</label><input id="eh_lat" placeholder="45° 19.098\'N"></div>';
  h+='<div class="field"><label>Longitude</label><input id="eh_lon" placeholder="085° 15.486\'W"></div>';
  h+='</div>';

  h+='<button class="wiz-btn secondary" style="padding:11px;font-size:.78rem;margin-bottom:0" onclick="addEmergHarbor()">＋ Add Emergency Harbor</button>';
  h+='</div>';

}

function addEmergHarbor(){
  var name=(document.getElementById('eh_name')||{}).value||'';
  if(!name.trim()){alert('Enter a harbor name.');return;}
  var harbor={
    name:name.trim(),dist:v('eh_dist'),vhf:v('eh_vhf')||'CH 9',
    lat:v('eh_lat'),lon:v('eh_lon'),phone:v('eh_phone'),why:v('eh_why')
  };
  var stops=ST.stops||[];
  var idx=ST.editingStop>=0?ST.editingStop:stops.length; // staging in temp
  if(!ST._tempEmerg)ST._tempEmerg=[];
  ST._tempEmerg.push(harbor);
  saveST();
  // re-render just the emergency section
  renderWizard();
}

function delEmergHarbor(i){
  if(!ST._tempEmerg)return;
  ST._tempEmerg.splice(i,1);
  saveST();renderWizard();
}

function toggleWizTag(el){el.classList.toggle('on');}
function getWizTags(){
  var tags=[];
  document.querySelectorAll('.tag-chip.on').forEach(function(el){tags.push(el.dataset.tagid);});
  return tags;
}

function saveStop(){
  var name=(document.getElementById('ns_name')||{}).value||'';
  var searchVal=(document.getElementById('ns_search')||{}).value||'';
  if(!name.trim() && !searchVal.trim()){alert('Please search for a place or enter a stop name.');return;}
  if(!name.trim()) name = searchVal.trim();

  // Build emerg list: existing (if editing) + new ones from _tempEmerg
  var existingEmerg=[];
  if(ST.editingStop>=0&&ST.stops[ST.editingStop]){
    existingEmerg=ST.stops[ST.editingStop].emerg||[];
  }
  var newEmerg=ST._tempEmerg||[];

  // Auto-calculate distance from previous stop if not provided
  var nm = v('ns_nm');
  var lat = v('ns_lat').trim();
  var lon = v('ns_lon').trim();
  if(!nm && lat && lon){
    var idx = ST.editingStop>=0 ? ST.editingStop : (ST.stops||[]).length;
    if(idx > 0 && ST.stops[idx-1]){
      var prev = ST.stops[idx-1];
      if(prev.lat && prev.lon){
        var p1 = decimalPair(prev.lat, prev.lon);
        var p2 = decimalPair(lat, lon);
        if(p1 && p2){
          nm = calcDistNm(p1.lat, p1.lon, p2.lat, p2.lon).toFixed(1);
        }
      }
    }
  }

  var stop={
    name:name.trim(),marina:v('ns_marina'),lat:lat,lon:lon,
    date:v('ns_date'),vhf:v('ns_vhf')||'CH 9',nm:nm,phone:v('ns_phone'),
    nav:v('ns_nav'),fuel:v('ns_fuel'),warn:v('ns_warn'),
    tags:getWizTags(),
    emerg:existingEmerg.concat(newEmerg)
  };
  if(!ST.stops)ST.stops=[];
  if(ST.editingStop>=0){ST.stops[ST.editingStop]=stop;ST.editingStop=-1;}
  else{ST.stops.push(stop);}
  ST._tempEmerg=[];
  saveST();renderWizard();
}
function editStop(i){
  ST.editingStop=i;
  ST._tempEmerg=[];
  saveST();renderWizard();
}
function cancelEditStop(){ST.editingStop=-1;ST._tempEmerg=[];renderWizard();}
function delStop(i){if(!confirm('Remove stop '+(i+1)+'?'))return;ST.stops.splice(i,1);saveST();renderWizard();}
function finishSetup(){
  if(!ST.stops||ST.stops.length<2){alert('Add at least 2 stops.');return;}
  ST.setup=true;ST.wizStep=0;ST.editingStop=-1;ST._tempEmerg=[];
  saveST();showApp();
}

// ═══════════════════════════════════════════════
function rFuel(){
  var tg=0,tc=0,ps=0,pc=0;
  var fuelStops=[];
  for(var i=0;i<ST.stops.length;i++){
    var s=ST.stops[i],noFuel=s.tags&&s.tags.indexOf('no_fuel')>=0;
    fuelStops.push({idx:i,name:s.marina||s.name,day:'Day '+(i+1),noFuel:noFuel,fillUp:s.tags&&s.tags.indexOf('fill_tanks')>=0});
    if(!noFuel){var g=parseFloat(ST.fuelGal[i])||0,p2=parseFloat(ST.fuelPrice[i])||0;tg+=g;tc+=g*p2;if(p2>0){ps+=p2;pc++;}}
  }
  var h='<div class="sec-hd"><div class="sec-title">Fuel Tracker</div><div class="sec-sub">Gallons · Price · Cost</div></div><div class="fc">';
  for(var i=0;i<fuelStops.length;i++){
    var s=fuelStops[i];
    h+='<div class="fr"><div class="fsi"><div class="fmn">'+esc(s.name)+'</div><div class="fmd" style="'+(s.fillUp?'color:var(--amber)':'')+'">'+s.day+(s.fillUp?' · FILL UP!':'')+'</div></div>';
    if(s.noFuel){h+='<div class="nofuel">⚠ NO FUEL</div>';}
    else{
      var gv=ST.fuelGal[s.idx]||'',pv=ST.fuelPrice[s.idx]||'',tot=(gv&&pv)?'$'+(parseFloat(gv)*parseFloat(pv)).toFixed(2):'—';
      h+='<div class="finps"><div class="frow"><input class="finp" type="number" min="0" inputmode="decimal" placeholder="gal" id="fg'+s.idx+'" value="'+gv+'" onchange="sF('+s.idx+',\'g\',this.value)">';
      h+='<input class="finp" type="number" min="0" step="0.01" inputmode="decimal" placeholder="$/gal" id="fp'+s.idx+'" value="'+pv+'" onchange="sF('+s.idx+',\'p\',this.value)"></div>';
      h+='<div class="ftot" id="ft'+s.idx+'">'+tot+'</div></div>';
    }

  }

function saveDecision(){
  ST.decision={windSpeed:(document.getElementById('windSpeedInput')||{}).value||'',windDir:(document.getElementById('windDirInput')||{}).value||'',waves:(document.getElementById('waveInput')||{}).value||''};
  saveST();renderContent();
}
function getDecision(){
  var d=ST.decision||{},speed=parseFloat(d.windSpeed)||0,waves=parseFloat(d.waves)||0,dir=(d.windDir||'').toUpperCase();
  var highRiskDir=['N','NW','NE'].indexOf(dir)>=0;
  if(waves>=4||speed>=20)return{state:'nogo',title:'NO-GO',copy:'Conditions are rough. Delay or shorten the leg.'};
  if(highRiskDir&&speed>=15)return{state:'nogo',title:'NO-GO',copy:'Unfavorable wind at 15+ kts. Hold and wait for a better window.'};
  if((highRiskDir&&speed>=10)||waves>=2.5||speed>=15)return{state:'caution',title:'CAUTION',copy:'Marginal conditions. Verify forecast, check buoy data, confirm backup harbors.'};
  return{state:'go',title:'GO',copy:'Conditions look manageable based on values entered.'};
}

function savePlan(){

function recommendedDeparture(day){
  var plan=ST.plan||{},speed=parseFloat(plan.speed||ST.vessel.speed)||10,nm=parseFloat(day.nm)||0;
  if(!nm)return{hours:0,departLabel:'—',arrivalLabel:'—',buffer:1};
  var hrs=speed>0?(nm/speed):0,safety=1,targetArrival=15;
  var dep=targetArrival-(hrs+safety),h2=Math.floor(dep),m2=Math.round((dep-h2)*60);
  if(m2===60){h2++;m2=0;}while(h2<0)h2+=24;while(h2>=24)h2-=24;
  var hh=((h2+11)%12)+1,ap=h2>=12?'PM':'AM';
  return{hours:hrs,departLabel:hh+':'+String(m2).padStart(2,'0')+' '+ap,arrivalLabel:etaFromNow(hrs),buffer:safety};
}
function etaFromNow(hours){var d=new Date();d.setMinutes(d.getMinutes()+Math.round(hours*60));var hh=d.getHours(),mm=d.getMinutes(),ap=hh>=12?'PM':'AM';hh=hh%12||12;return hh+':'+String(mm).padStart(2,'0')+' '+ap;}

function getLegSafety(nm){
  var p=ST.plan||{},tank=parseFloat(p.tankSize||ST.vessel.tankSize)||0,current=parseFloat(p.currentFuel)||0,reserve=(parseFloat(p.reservePct)||0)/100,burn=parseFloat(p.burn||ST.vessel.burn)||18,speed=parseFloat(p.speed||ST.vessel.speed)||10;
  var usable=Math.max(0,current-(tank*reserve)),maxNm=burn>0&&speed>0?(usable/burn)*speed:0,reqGal=speed>0&&burn>0?(nm/speed)*burn:0,margin=maxNm-nm;
  var status='NO-GO',cls='range-no';if(margin>=20){status='GOOD';cls='range-ok';}else if(margin>=0){status='TIGHT';cls='range-warn';}
  return{usable:usable,maxNm:maxNm,reqGal:reqGal,status:status,cls:cls};
}
function rFuelPlanner(){
  var p=ST.plan||{},d=ST.stops[curDay];if(!d)return'';
  var curSafety=getLegSafety(parseFloat(d.nm)||0);
  var h='<div class="v2-card"><div class="v2-hd"><div><div class="v2-title">Fuel Range Planner</div><div class="v2-sub">Live safety margin</div></div><span class="vbdg">Range</span></div><div class="v2-body">';
  h+='<div class="grid3"><div><div class="lblx">Tank (gal)</div><input id="planTank" class="sel" type="number" inputmode="decimal" value="'+(p.tankSize||ST.vessel.tankSize||'250')+'" onchange="savePlanFull()"></div><div><div class="lblx">Fuel Aboard</div><input id="planFuel" class="sel" type="number" inputmode="decimal" value="'+(p.currentFuel||'200')+'" onchange="savePlanFull()"></div><div><div class="lblx">Reserve %</div><input id="planReserve" class="sel" type="number" inputmode="decimal" value="'+(p.reservePct||'20')+'" onchange="savePlanFull()"></div></div>';
  h+='<div class="stat-row"><div class="stat-pill"><div class="stat-v">'+curSafety.maxNm.toFixed(0)+'</div><div class="stat-l">Safe Range NM</div></div><div class="stat-pill"><div class="stat-v">'+curSafety.reqGal.toFixed(0)+'</div><div class="stat-l">This Leg Gal</div></div><div class="stat-pill"><div class="stat-v '+curSafety.cls+'">'+curSafety.status+'</div><div class="stat-l">Status</div></div></div>';
  h+='<div class="inline-note">Reset Fuel Aboard after each top-off. Planning tool only.</div>';
  var hasNm=false;for(var i=0;i<ST.stops.length;i++)if(ST.stops[i].nm)hasNm=true;
  if(hasNm){h+='<div class="leg-head leg-grid"><div>Leg</div><div>NM</div><div>Gal</div><div>Status</div></div>';for(var i=0;i<ST.stops.length;i++){var nm2=parseFloat(ST.stops[i].nm)||0,s2=getLegSafety(nm2);h+='<div class="leg-row leg-grid"><div>'+esc(ST.stops[i].name)+'</div><div>'+nm2.toFixed(0)+'</div><div>'+s2.reqGal.toFixed(0)+'</div><div class="'+s2.cls+'">'+s2.status+'</div></div>';}}
  h+='</div></div>';return h;
}

function degToCardinal(deg){deg=parseFloat(deg);if(isNaN(deg))return'';var dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];return dirs[Math.round(deg/22.5)%16];}
function parseWindSpeedKts(vv){if(vv==null)return null;var s=String(vv);var m=s.match(/([0-9]+(?:\.[0-9]+)?)/);if(!m)return null;var n=parseFloat(m[1]);return /km\/?h/i.test(s)?(n*0.539957):n;}
function fmtTime(ts){if(!ts)return'—';try{return new Date(ts).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});}catch(e){return'—';}}
async function fetchLiveWeather(force){
  var d=ST.stops[curDay],pair=decimalPair(d.lat,d.lon);

    var points=await fetch('https://api.weather.gov/points/'+pair.lat.toFixed(4)+','+pair.lon.toFixed(4),{headers:{'Accept':'application/geo+json'}}).then(function(r){if(!r.ok)throw new Error('NWS lookup failed ('+r.status+')');return r.json();});
    var props=points.properties||{};

    var station=(stationList.features&&stationList.features[0])||null;

    var obs=await fetch((station.id||('https://api.weather.gov/stations/'+stationId))+'/observations/latest',{headers:{'Accept':'application/geo+json'}}).then(function(r){if(!r.ok)throw new Error('Observation unavailable');return r.json();});
    var hourly=props.forecastHourly?await fetch(props.forecastHourly,{headers:{'Accept':'application/geo+json'}}).then(function(r){if(!r.ok)throw new Error('Hourly forecast unavailable');return r.json();}):null;
    var op=(obs.properties||{}),period=(hourly&&hourly.properties&&hourly.properties.periods&&hourly.properties.periods[0])||null;
    ST.weather[key]={fetchedAt:Date.now(),loading:false,error:'',stationName:(station.properties&&station.properties.name)||stationId,stationId:stationId,observationTime:op.timestamp||null,currentWindDir:op.windDirection&&op.windDirection.value!=null?degToCardinal(op.windDirection.value):'',currentWindKts:op.windSpeed&&op.windSpeed.value!=null?(op.windSpeed.value*1.94384):null,currentGustKts:op.windGust&&op.windGust.value!=null?(op.windGust.value*1.94384):null,currentText:op.textDescription||'',temperatureC:op.temperature&&op.temperature.value!=null?op.temperature.value:null,forecastName:period&&period.name?period.name:'Next hour',forecastWindDir:period?period.windDirection:'',forecastWindKts:period?parseWindSpeedKts(period.windSpeed):null,forecastShort:period&&period.shortForecast?period.shortForecast:''};
    saveST();renderContent();

}

function dmmToDecimal(s){if(!s)return null;var m=String(s).match(/(\d+)[^\d]+(\d+(?:\.\d+)?)[^\d]*([NSEW])/i);if(!m)return null;var deg=parseFloat(m[1]),mins=parseFloat(m[2]),hemi=m[3].toUpperCase();var dec=deg+(mins/60);if(hemi==='S'||hemi==='W')dec*=-1;return dec;}

function selectPlace(data, idx){
  // Fill hidden and visible fields
  var nameEl   = document.getElementById('ns_name');
  var nameElV  = document.getElementById('ns_name_v');
  var marinaEl = document.getElementById('ns_marina');
  var marinaElV= document.getElementById('ns_marina_v');
  var latEl    = document.getElementById('ns_lat');
  var latElV   = document.getElementById('ns_lat_v');
  var lonEl    = document.getElementById('ns_lon');
  var lonElV   = document.getElementById('ns_lon_v');
  var searchEl = document.getElementById('ns_search');

  // Parse display name into a clean stop name
  var parts = data.display.split(',');
  var stopName = parts[0].trim();
  var marinaName = parts.slice(0,2).join(', ').trim();

  if(nameEl)    nameEl.value = stopName;
  if(nameElV)   nameElV.value = stopName;
  if(marinaEl && !marinaEl.value) marinaEl.value = marinaName;
  if(marinaElV && !marinaElV.value) marinaElV.value = marinaName;
  if(latEl)     latEl.value = data.lat;
  if(latElV)    latElV.value = data.lat;
  if(lonEl)     lonEl.value = data.lon;
  if(lonElV)    lonElV.value = data.lon;
  if(searchEl)  searchEl.value = stopName;

  // Show the green selected indicator
  var sel = document.getElementById('place-selected');
  var selName = document.getElementById('place-selected-name');
  var selCoords = document.getElementById('place-selected-coords');
  if(sel)       sel.style.display = 'flex';
  if(selName)   selName.textContent = stopName;
  if(selCoords) selCoords.textContent = data.lat + ' / ' + data.lon;

  hidePlaceResults();
  _lastQuery = '';

  // ── Auto-search nearby emergency harbors ──
  var decLat = navFormatToDecimal(data.lat);
  var decLon = navFormatToDecimal(data.lon);
  if(decLat !== null && decLon !== null){
    searchNearbyEmergHarbors(decLat, decLon, stopName);

    // Also auto-fill distance from previous stop
    var idx = ST.editingStop>=0 ? ST.editingStop : (ST.stops||[]).length;
    if(idx > 0 && ST.stops[idx-1]){
      var prev = ST.stops[idx-1];
      if(prev.lat && prev.lon){
        var p1 = decimalPair(prev.lat, prev.lon);
        if(p1){
          var nm = calcDistNm(p1.lat, p1.lon, decLat, decLon).toFixed(1);
          var nmEl = document.getElementById('ns_nm');
          var nmElV = document.getElementById('ns_nm_v');
          if(nmEl) nmEl.value = nm;
          if(nmElV) nmElV.value = nm;
        }
      }
    }
  }
}

// Convert DD° MM.mmm'N back to decimal for API call
function navFormatToDecimal(str){
  if(!str) return null;
  var m = String(str).match(/(\d+)[^\d]+(\d+(?:\.\d+)?)[^\d]*([NSEW])/i);
  if(!m) return null;
  var dec = parseFloat(m[1]) + parseFloat(m[2])/60;
  if(m[3].toUpperCase()==='S'||m[3].toUpperCase()==='W') dec *= -1;
  return dec;
}

async function searchNearbyEmergHarbors(lat, lon, stopName){
  // Show loading state in emergency section
  var emergSection = document.getElementById('emerg-suggest-area');
  if(!emergSection) return;
  emergSection.innerHTML =
    '<div style="font-size:.68rem;color:var(--sky);padding:10px 0">🔍 Searching for nearby emergency harbors…</div>';

  try {
    // Search for marinas, harbours, boat ramps within ~50km
    var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=8&addressdetails=1'
      + '&viewbox='+(lon-0.8)+','+(lat+0.6)+','+(lon+0.8)+','+(lat-0.6)
      + '&bounded=0'
      + '&q=marina+OR+harbour+OR+harbor+OR+boat+launch'
      + '&lat='+lat+'&lon='+lon;

    // Use Overpass API for more accurate marina/harbour results
    var overpassUrl = 'https://overpass-api.de/api/interpreter';
    var overpassQuery = '[out:json][timeout:15];('
      + 'node["leisure"="marina"](around:60000,'+lat+','+lon+');'
      + 'node["harbour"="yes"](around:60000,'+lat+','+lon+');'
      + 'node["seamark:type"="harbour"](around:60000,'+lat+','+lon+');'
      + 'way["leisure"="marina"](around:60000,'+lat+','+lon+');'
      + ');out center 8;';

    var res = await fetch(overpassUrl, {
      method:'POST',
      body:'data='+encodeURIComponent(overpassQuery),
      headers:{'Content-Type':'application/x-www-form-urlencoded'}
    });

    if(!res.ok) throw new Error('Overpass API error');
    var data = await res.json();
    var elements = (data.elements||[]).filter(function(e){
      return e.tags && (e.tags.name);
    });

    if(elements.length === 0){
      emergSection.innerHTML =
        '<div style="font-size:.66rem;color:var(--muted);padding:6px 0">No marinas found nearby. Add emergency harbors manually below.</div>';
      return;
    }

    // Build suggested harbor cards
    var h = '<div style="font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--sky);margin-bottom:8px">⚓ Nearby Marinas Found — Tap to Add as Emergency Harbor</div>';
    h += '<div id="emerg-suggest-list">';

    elements.forEach(function(el, i){
      var elLat = el.lat || (el.center && el.center.lat);
      var elLon = el.lon || (el.center && el.center.lon);
      if(!elLat || !elLon) return;

      var name = el.tags.name || 'Marina';
      var phone = el.tags.phone || el.tags['contact:phone'] || '';
      var distNm = calcDistNm(lat, lon, elLat, elLon);
      var bearing = calcBearing(lat, lon, elLat, elLon);
      var distStr = distNm.toFixed(1) + ' NM ' + bearing;
      var latStr = decToNavFormat(elLat, 'lat');
      var lonStr = decToNavFormat(elLon, 'lon');

      // Build pre-filled harbor object
      var harbor = {
        name: name,
        dist: '~' + distStr,
        lat: latStr,
        lon: lonStr,
        vhf: 'CH 9',
        phone: phone,
        why: 'Nearest marina ~'+distStr+' from '+stopName+'. Divert here if conditions deteriorate.'
      };
      var harborJson = JSON.stringify(harbor).replace(/"/g,'&quot;');

      h += '<div style="background:rgba(0,20,40,.7);border:1px solid rgba(90,184,232,.18);border-radius:8px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px">'
        + '<div style="flex:1">'
        + '<div style="font-size:.78rem;font-weight:700;color:var(--cream)">'+esc(name)+'</div>'
        + '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:.6rem;color:var(--sky);margin-top:2px">'+latStr+' / '+lonStr+'</div>'
        + '<div style="font-size:.62rem;color:var(--muted);margin-top:2px">'+distStr+(phone?' · 📞 '+esc(phone):'')+'</div>'
        + '</div>'
        + '<button onclick="addSuggestedHarbor('+harborJson+')" style="flex-shrink:0;padding:7px 12px;background:rgba(232,184,64,.12);border:1px solid rgba(232,184,64,.28);border-radius:7px;color:var(--gold);font-size:.65rem;font-weight:700;cursor:pointer;font-family:inherit">＋ Add</button>'
        + '</div>';
    });

    h += '</div>';
    h += '<div style="font-size:.6rem;color:var(--muted);margin-top:6px;line-height:1.5">Based on OpenStreetMap data. Verify details before relying on in an emergency.</div>';
    emergSection.innerHTML = h;

  } catch(err) {
    emergSection.innerHTML =
      '<div style="font-size:.66rem;color:var(--muted);padding:6px 0">Could not auto-search nearby harbors. Add them manually below.</div>';
  }
}

function addSuggestedHarbor(harbor){
  if(!ST._tempEmerg) ST._tempEmerg = [];
  // Check for duplicate
  var exists = ST._tempEmerg.some(function(e){ return e.name === harbor.name; });
  var alsoExists = (ST.editingStop>=0 && ST.stops[ST.editingStop] && (ST.stops[ST.editingStop].emerg||[]).some(function(e){return e.name===harbor.name;}));
  if(exists || alsoExists){ alert(harbor.name + ' is already added.'); return; }
  ST._tempEmerg.push(harbor);
  saveST();
  // Just remove the clicked button and show a tick so page doesn't re-render
  event.target.textContent = '✓ Added';
  event.target.style.background = 'rgba(40,200,112,.15)';
  event.target.style.borderColor = 'rgba(40,200,112,.3)';
  event.target.style.color = 'var(--green)';
  event.target.disabled = true;
}

// Calculate distance in nautical miles between two lat/lon points
function calcDistNm(lat1, lon1, lat2, lon2){
  var R = 3440.065; // Earth radius in NM
  var dLat = (lat2-lat1)*Math.PI/180;
  var dLon = (lon2-lon1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
          Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Calculate cardinal bearing from point 1 to point 2
function calcBearing(lat1, lon1, lat2, lon2){
  var dLon = (lon2-lon1)*Math.PI/180;
  var y = Math.sin(dLon)*Math.cos(lat2*Math.PI/180);
  var x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) -
          Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLon);
  var brng = Math.atan2(y, x)*180/Math.PI;
  brng = (brng + 360) % 360;
  var dirs = ['N','NE','NE','E','E','SE','SE','S','S','SW','SW','W','W','NW','NW','N'];
  return dirs[Math.round(brng/22.5) % 16];
}

function clearPlaceSelection(){
  var sel = document.getElementById('place-selected');
  if(sel) sel.style.display = 'none';
  var latEl = document.getElementById('ns_lat');
  var lonEl = document.getElementById('ns_lon');
  var nameEl = document.getElementById('ns_name');
  var searchEl = document.getElementById('ns_search');
  if(latEl) latEl.value = '';
  if(lonEl) lonEl.value = '';
  if(nameEl) nameEl.value = '';
  if(searchEl) searchEl.value = '';
  _lastQuery = '';
}

function hidePlaceResults(){
  var box = document.getElementById('place-results');
  if(box){ box.style.display = 'none'; box.innerHTML = ''; }
}

// Close results if tapping outside
document.addEventListener('click', function(e){
  var box = document.getElementById('place-results');
  var inp = document.getElementById('ns_search');
  if(box && inp && !box.contains(e.target) && e.target !== inp){
    hidePlaceResults();
  }
});

function getPlaceIcon(type, cls){
  if(!type && !cls) return '📍';
  var t = (type||'').toLowerCase(), c = (cls||'').toLowerCase();
  if(t==='marina'||t==='harbour'||t==='harbor') return '⚓';
  if(t==='bay'||t==='cove'||t==='inlet') return '🌊';
  if(t==='island') return '🏝';
  if(c==='waterway') return '💧';
  if(t==='city'||t==='town'||t==='village') return '🏙';
  if(c==='natural') return '🌿';
  if(c==='amenity') return '🏛';
  return '📍';
}

// Convert decimal degrees to DD° MM.mmm' N/S/E/W format
function decToNavFormat(dec, axis){
  var hemi = axis==='lat' ? (dec>=0?'N':'S') : (dec>=0?'E':'W');
  var abs = Math.abs(dec);
  var deg = Math.floor(abs);
  var mins = (abs - deg) * 60;
  var degStr = String(deg).padStart(axis==='lat'?2:3, '0');
  return degStr + '° ' + mins.toFixed(3) + '\'' + hemi;
}

window.addEventListener('online',updateNetworkStatus);
window.addEventListener('offline',updateNetworkStatus);
window.addEventListener('DOMContentLoaded',boot);
